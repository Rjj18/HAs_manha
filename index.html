<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle Geral de Horarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="min-h-screen bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useMemo, useRef, useState } = React;

      const scheduleData = [
        {
          day: "Segunda-feira",
          slots: [
            ["LINO"],
            ["DIEGO", "LINO", "FERNANDO"],
            ["LETICIA", "EDSON", "REGINALDO", "ELIETE", "ANDREIA"],
            ["GABRIEL", "TUDS", "JULIA M.", "JULIO", "JULIA B."],
            ["AMANDA", "ALINE", "DENISE", "KATTY", "LINO"],
            ["ALINE", "JOAQUIM", "NILDA"],
          ],
        },
        {
          day: "Terca-feira",
          slots: [
            ["EDSON"],
            ["KATTY", "LINO", "LUCILENE"],
            ["HENRIQUE", "TUDS", "JULIO", "FERNANDO"],
            ["FABIO", "JOAQUIM", "TUDS", "NILDA", "ANDREIA"],
            ["DIEGO", "AMANDA", "SIMONE"],
            ["SIMONE", "MARIO"],
          ],
        },
        {
          day: "Quarta-feira",
          slots: [
            ["KATTY"],
            ["DENISE", "JULIA M.", "JULIO", "FERNANDO", "JULIA B."],
            ["GABRIEL", "LETICIA", "HENRIQUE", "JULIA M.", "GLAUCIA"],
            ["FABIO", "REGINALDO", "AMANDA", "ELIETE", "JULIA M.", "ANDREIA"],
            ["SANDRA", "NILDA", "ELIETE", "JULIA M."],
            ["JOAQUIM", "SIMONE", "MARIO"],
          ],
        },
        {
          day: "Quinta-feira",
          slots: [
            [],
            ["JOAQUIM", "KATTY"],
            ["DIEGO", "HENRIQUE", "NILDA", "GLAUCIA", "ANDREIA"],
            ["TUDS", "ELIETE", "JULIA M.", "JULIO", "FERNANDO", "JULIA B.", "LUCILENE"],
            ["DIEGO", "DENISE"],
            ["KATTY", "LINO"],
          ],
        },
        {
          day: "Sexta-feira",
          slots: [
            ["FERNANDO"],
            ["AMANDA", "EDSON"],
            ["JULIA B.", "LINO", "MARIO"],
            ["HENRIQUE", "NILDA"],
            ["GABRIEL", "SANDRA"],
            ["ALINE", "TUDS"],
          ],
        },
      ];

      const timeSlots = ["7:00 - 7:45", "7:45 - 8:30", "8:50 - 9:35", "9:35 - 10:20", "10:20 - 11:05", "11:05 - 11:50"];

      const colorPalette = [
        "bg-blue-100 text-blue-800 border-blue-200",
        "bg-green-100 text-green-800 border-green-200",
        "bg-red-100 text-red-800 border-red-200",
        "bg-pink-100 text-pink-800 border-pink-200",
        "bg-indigo-100 text-indigo-800 border-indigo-200",
        "bg-teal-100 text-teal-800 border-teal-200",
        "bg-orange-100 text-orange-800 border-orange-200",
        "bg-cyan-100 text-cyan-800 border-cyan-200",
        "bg-emerald-100 text-emerald-800 border-emerald-200",
        "bg-lime-100 text-lime-800 border-lime-200",
        "bg-rose-100 text-rose-800 border-rose-200",
        "bg-yellow-100 text-yellow-800 border-yellow-200",
      ];

      function CalendarIcon({ className }) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
            <rect x="3" y="4" width="18" height="18" rx="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        );
      }

      function FilterIcon({ className }) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
        );
      }

      function ClockIcon({ className }) {
        return (
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}>
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
        );
      }

      function App() {
        const [selectedPeople, setSelectedPeople] = useState([]);
        const [isFilterOpen, setIsFilterOpen] = useState(false);
        const filterRef = useRef(null);

        const allNames = useMemo(() => {
          const names = new Set();
          scheduleData.forEach((day) => {
            day.slots.forEach((slot) => slot.forEach((name) => names.add(name)));
          });
          return Array.from(names).sort();
        }, []);

        const nameColorMap = useMemo(() => {
          const map = {};
          allNames.forEach((name, index) => {
            map[name] = colorPalette[index % colorPalette.length];
          });
          return map;
        }, [allNames]);

        const togglePerson = (name) => {
          setSelectedPeople((current) =>
            current.includes(name) ? current.filter((person) => person !== name) : [...current, name]
          );
        };

        useEffect(() => {
          const handleClickOutside = (event) => {
            if (filterRef.current && !filterRef.current.contains(event.target)) {
              setIsFilterOpen(false);
            }
          };

          document.addEventListener("mousedown", handleClickOutside);
          return () => document.removeEventListener("mousedown", handleClickOutside);
        }, []);

        return (
          <div className="min-h-screen p-4 md:p-8">
            <div className="max-w-7xl mx-auto space-y-6">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                  <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                    <CalendarIcon className="w-6 h-6 text-blue-600" />
                    Controle Geral de Horarios
                  </h1>
                  <p className="text-gray-500 mt-1 text-sm">Visualizacao interativa da escala da semana</p>
                </div>

                <div ref={filterRef} className="relative w-full md:w-80">
                  <button
                    type="button"
                    onClick={() => setIsFilterOpen((current) => !current)}
                    className="w-full flex items-center gap-3 bg-gray-50 p-2.5 rounded-lg border border-gray-200 text-left"
                  >
                    <FilterIcon className="w-5 h-5 text-gray-400 ml-1" />
                    <div className="flex-1 min-w-0">
                      <p className="text-sm font-medium text-gray-700">Filtrar professores</p>
                      <p className="text-xs text-gray-500 truncate">
                        {selectedPeople.length === 0
                          ? "Todos os profissionais"
                          : `${selectedPeople.length} professor${selectedPeople.length > 1 ? "es" : ""} selecionado${selectedPeople.length > 1 ? "s" : ""}`}
                      </p>
                    </div>
                    <span className="text-gray-400 text-xs">{isFilterOpen ? "▲" : "▼"}</span>
                  </button>

                  {isFilterOpen && (
                    <div className="absolute top-full left-0 mt-2 w-full z-30 bg-white border border-gray-200 rounded-lg shadow-lg p-2.5">
                      <div className="flex items-center justify-between mb-2 px-1">
                        <p className="text-xs font-semibold text-gray-600">Selecione um ou mais</p>
                        <button
                          type="button"
                          onClick={() => setSelectedPeople([])}
                          disabled={selectedPeople.length === 0}
                          className="text-xs font-semibold px-2 py-1 rounded border border-gray-200 text-gray-600 disabled:opacity-40 disabled:cursor-not-allowed"
                        >
                          Limpar
                        </button>
                      </div>

                      <div className="max-h-56 overflow-y-auto pr-1 space-y-1">
                        {allNames.map((name) => (
                          <label
                            key={name}
                            className={`flex items-center gap-2 rounded-md border px-2.5 py-2 text-sm cursor-pointer transition-colors ${
                              selectedPeople.includes(name)
                                ? "bg-blue-50 border-blue-200 text-blue-800"
                                : "bg-white border-gray-200 text-gray-700"
                            }`}
                          >
                            <input
                              type="checkbox"
                              checked={selectedPeople.includes(name)}
                              onChange={() => togglePerson(name)}
                              className="rounded border-gray-300 text-blue-600 focus:ring-blue-500"
                            />
                            <span className="truncate">{name}</span>
                          </label>
                        ))}
                      </div>
                    </div>
                  )}
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-gray-50">
                        <th className="p-4 border-b border-gray-200 font-semibold text-gray-600 sticky left-0 bg-gray-50 z-10 w-44 shadow-[1px_0_0_0_#e5e7eb]">
                          Dia da Semana
                        </th>
                        {timeSlots.map((time, index) => (
                          <React.Fragment key={index}>
                            {index === 2 && (
                              <th className="bg-amber-50/50 border-b border-gray-200 px-2 text-center w-10">
                                <ClockIcon className="w-4 h-4 text-amber-400 mx-auto" />
                              </th>
                            )}
                            <th className="p-4 border-b border-gray-200 font-semibold text-gray-600 min-w-[210px]">
                              <div className="flex flex-col items-center justify-center bg-white border border-gray-200 rounded-md py-1 px-3 shadow-sm w-max mx-auto">
                                <span className="text-xs text-gray-400 font-normal uppercase tracking-wider mb-0.5">
                                  Horario {index + 1}
                                </span>
                                <span className="text-sm font-bold text-gray-700">{time}</span>
                              </div>
                            </th>
                          </React.Fragment>
                        ))}
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {scheduleData.map((dayData, dayIndex) => (
                        <tr key={dayIndex} className="hover:bg-gray-50/50 transition-colors">
                          <td className="p-4 font-medium text-gray-700 sticky left-0 bg-white shadow-[1px_0_0_0_#e5e7eb] z-10">
                            {dayData.day}
                          </td>

                          {dayData.slots.map((namesInSlot, slotIndex) => {
                            const hasVisibleNames =
                              selectedPeople.length === 0 || namesInSlot.some((name) => selectedPeople.includes(name));

                            return (
                              <React.Fragment key={slotIndex}>
                                {slotIndex === 2 && <td className="bg-amber-50/30 border-l border-r border-amber-100/50"></td>}
                                <td className="p-3 align-top border-l border-gray-100">
                                  <div className="flex flex-wrap gap-1.5 justify-center min-h-6">
                                    {namesInSlot.length === 0 ? (
                                      <span className="text-gray-300 text-xs italic">- Livre -</span>
                                    ) : (
                                      namesInSlot.map((name, i) => {
                                        const isHighlighted = selectedPeople.length === 0 || selectedPeople.includes(name);
                                        const isDimmed = selectedPeople.length > 0 && !isHighlighted;

                                        return (
                                          <span
                                            key={`${name}-${i}`}
                                            className={`
                                              px-2.5 py-1 text-xs font-semibold rounded-md border
                                              transition-all duration-200 ease-in-out
                                              ${nameColorMap[name]}
                                              ${isDimmed ? "opacity-20 grayscale" : "opacity-100 shadow-sm"}
                                              ${selectedPeople.includes(name) ? "ring-2 ring-offset-1 ring-blue-400 scale-105" : ""}
                                            `}
                                          >
                                            {name}
                                          </span>
                                        );
                                      })
                                    )}
                                    {!hasVisibleNames && namesInSlot.length > 0 && (
                                      <span className="text-[10px] text-gray-300 w-full text-center">sem ocorrencia do filtro</span>
                                    )}
                                  </div>
                                </td>
                              </React.Fragment>
                            );
                          })}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 text-xs text-gray-400 px-1 sm:px-4">
                <p>
                  Total de profissionais unicos na escala: <strong className="text-gray-600">{allNames.length}</strong>
                </p>
                <div className="flex items-center gap-1">
                  <span className="w-3 h-3 rounded-full bg-amber-100 border border-amber-200"></span>
                  <span>Pausa / Intervalo (8:30 - 8:50)</span>
                </div>
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
